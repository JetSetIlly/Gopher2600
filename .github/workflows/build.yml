name: build macOS

on:
  workflow_dispatch:

jobs:

  build-macos-intel:
    runs-on: macos-15-intel
    env:
      MACOSX_DEPLOYMENT_TARGET: 10.11
      BINARY_NAME: gopher2600_darwin_amd64
    steps:
    - name: Install dependencies
      run: |
        brew install go
        brew install sdl2
        brew install dylibbundler
    - uses: actions/checkout@v6
    - name: Extract version from Makefile
      id: version
      run: |
        VERSION=$(awk -F ' = ' '/^version = / {print $2; exit}' Makefile)
        if [ -z "$VERSION" ]; then
          echo "Failed to extract version from Makefile" >&2
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
    - name: Build Gopher2600 (Intel)
      run: make release
    - name: Copy executable to package
      run: |
        mkdir -p .package/Gopher2600.app/Contents/MacOS
        cp "$BINARY_NAME" .package/Gopher2600.app/Contents/MacOS/
    - name: Set plist metadata
      run: |
        plutil -insert CFBundleExecutable -string "$BINARY_NAME" .package/Gopher2600.app/Contents/Info.plist
        plutil -insert CFBundleShortVersionString -string "${{ steps.version.outputs.version }}" .package/Gopher2600.app/Contents/Info.plist
    - name: Run dylibbundler
      run: |
        export DYLD_LIBRARY_PATH="$(brew --prefix sdl2)/lib"
        dylibbundler -x ".package/Gopher2600.app/Contents/MacOS/$BINARY_NAME" -b -cd -d .package/Gopher2600.app/Contents/libs
    - name: Zip package
      run: |
        cd .package
        zip -vr Gopher2600.zip Gopher2600.app
    - name: Upload package
      uses: actions/upload-artifact@v6
      with:
        name: Gopher2600-macOS-Intel
        path: .package/Gopher2600.zip
    - name: Upload binary for universal build
      uses: actions/upload-artifact@v6
      with:
        name: binary-intel
        path: .package/Gopher2600.app/Contents/MacOS/${{ env.BINARY_NAME }}
    - name: Upload libs for universal build
      uses: actions/upload-artifact@v6
      with:
        name: libs-intel
        path: .package/Gopher2600.app/Contents/libs/

  build-macos-arm:
    runs-on: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: 11.0
      BINARY_NAME: gopher2600_darwin_arm64
    steps:
    - name: Install dependencies
      run: |
        brew install go
        brew install sdl2
        brew install dylibbundler
    - uses: actions/checkout@v6
    - name: Extract version from Makefile
      id: version
      run: |
        VERSION=$(awk -F ' = ' '/^version = / {print $2; exit}' Makefile)
        if [ -z "$VERSION" ]; then
          echo "Failed to extract version from Makefile" >&2
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
    - name: Build Gopher2600 (ARM64)
      run: make release
    - name: Copy executable to package
      run: |
        mkdir -p .package/Gopher2600.app/Contents/MacOS
        cp "$BINARY_NAME" .package/Gopher2600.app/Contents/MacOS/
    - name: Set plist metadata
      run: |
        plutil -insert CFBundleExecutable -string "$BINARY_NAME" .package/Gopher2600.app/Contents/Info.plist
        plutil -insert CFBundleShortVersionString -string "${{ steps.version.outputs.version }}" .package/Gopher2600.app/Contents/Info.plist
    - name: Run dylibbundler
      run: |
        export DYLD_LIBRARY_PATH="$(brew --prefix sdl2)/lib"
        dylibbundler -x ".package/Gopher2600.app/Contents/MacOS/$BINARY_NAME" -b -cd -d .package/Gopher2600.app/Contents/libs
    - name: Zip package
      run: |
        cd .package
        zip -vr Gopher2600.zip Gopher2600.app
    - name: Upload package
      uses: actions/upload-artifact@v6
      with:
        name: Gopher2600-macOS-AppleSilicon
        path: .package/Gopher2600.zip
    - name: Upload binary for universal build
      uses: actions/upload-artifact@v6
      with:
        name: binary-arm
        path: .package/Gopher2600.app/Contents/MacOS/${{ env.BINARY_NAME }}
    - name: Upload libs for universal build
      uses: actions/upload-artifact@v6
      with:
        name: libs-arm
        path: .package/Gopher2600.app/Contents/libs/

  build-macos-universal:
    runs-on: macos-15
    needs: [build-macos-intel, build-macos-arm]
    env:
      BINARY_NAME: gopher2600_darwin_universal
    steps:
    - uses: actions/checkout@v6
    - name: Extract version from Makefile
      id: version
      run: |
        VERSION=$(awk -F ' = ' '/^version = / {print $2; exit}' Makefile)
        if [ -z "$VERSION" ]; then
          echo "Failed to extract version from Makefile" >&2
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
    - name: Download Intel binary
      uses: actions/download-artifact@v6
      with:
        name: binary-intel
        path: intel/
    - name: Download ARM binary
      uses: actions/download-artifact@v6
      with:
        name: binary-arm
        path: arm/
    - name: Download Intel libs
      uses: actions/download-artifact@v6
      with:
        name: libs-intel
        path: libs-intel/
    - name: Download ARM libs
      uses: actions/download-artifact@v6
      with:
        name: libs-arm
        path: libs-arm/
    - name: Create universal binary
      run: |
        lipo -create intel/gopher2600_darwin_amd64 arm/gopher2600_darwin_arm64 -output "$BINARY_NAME"
        chmod +x "$BINARY_NAME"
    - name: Create universal libs
      run: |
        mkdir -p universal-libs
        for lib in libs-arm/*.dylib; do
          libname=$(basename "$lib")
          if [ -f "libs-intel/$libname" ]; then
            lipo -create "libs-intel/$libname" "libs-arm/$libname" -output "universal-libs/$libname"
          else
            cp "$lib" "universal-libs/$libname"
          fi
        done
    - name: Assemble app bundle
      run: |
        mkdir -p .package/Gopher2600.app/Contents/MacOS
        mkdir -p .package/Gopher2600.app/Contents/libs
        cp "$BINARY_NAME" .package/Gopher2600.app/Contents/MacOS/
        cp universal-libs/*.dylib .package/Gopher2600.app/Contents/libs/
    - name: Set plist metadata
      run: |
        plutil -insert CFBundleExecutable -string "$BINARY_NAME" .package/Gopher2600.app/Contents/Info.plist
        plutil -insert CFBundleShortVersionString -string "${{ steps.version.outputs.version }}" .package/Gopher2600.app/Contents/Info.plist
    - name: Fix dylib paths in universal binary
      run: |
        for lib in .package/Gopher2600.app/Contents/libs/*.dylib; do
          libname=$(basename "$lib")
          install_name_tool -change "@executable_path/../libs/$libname" "@executable_path/../libs/$libname" ".package/Gopher2600.app/Contents/MacOS/$BINARY_NAME" 2>/dev/null || true
          install_name_tool -id "@executable_path/../libs/$libname" "$lib" 2>/dev/null || true
        done
    - name: Zip package
      run: |
        cd .package
        zip -vr Gopher2600.zip Gopher2600.app
    - name: Upload package
      uses: actions/upload-artifact@v6
      with:
        name: Gopher2600-macOS-Universal
        path: .package/Gopher2600.zip
